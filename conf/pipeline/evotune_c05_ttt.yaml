# @package _global_
# Full chain: evotuning on OAS → C05 VH-pid30 finetune → TTT on the C05 reference.
# Each stage seeds from the previous stage's best/final checkpoint automatically.
pipeline:
  init_from: null
  stages:
    - name: evotuning
      task: evotuning
      data: oas_full
    - name: c05_finetune
      task: evotuning_c05
      data: c05_vh_pid30
    - name: ttt
      task: ttt
      data: c05_ref

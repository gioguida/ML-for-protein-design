seed: 42
data:
  raw_csv: data/raw/M22_binding_enrichment.csv
  processed_dir: data/processed
  force_rebuild: false
  pairing_strategy: positive_vs_tail
  min_positive_delta: 0.0
  min_delta_margin: 0.0
  include_views:
  - mut1
  - mut2
  deduplicate_across_views: true
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
model:
  esm_model_path: /cluster/project/krause/flohmann/mgm/oracle_assets/esm2_8m.safetensors
  use_context: true
training:
  batch_size: 128
  num_epochs: 25
  lr: 1.0e-05
  weight_decay: 0.0
  beta: 0.1
  grad_clip_norm: 1.0
  patience: 10
  device: cuda
  num_workers: 0
  resume_checkpoint: null
  evaluate_best_checkpoint: true
  scheduler:
    enabled: false
    step_size: 100
    gamma: 0.95
logging:
  level: INFO
  preview_count: 5
  log_every_n_steps: 20
  history_csv: history.csv
checkpointing:
  dir: checkpoints
  best_filename: best.pt
  last_filename: last.pt
output_dir: outputs
wandb:
  enabled: true
  project: flu
  entity: null
  run_name: null
  tags: []
  notes: null
